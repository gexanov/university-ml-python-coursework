<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Авито — Создать объявление</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: rgba(255,255,255,0.72);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1.5px solid #00A046;
      border-radius: 24px;
      box-shadow: 0 2px 24px rgba(0,160,70,0.07);
      padding: 52px 88px 56px;
      width: 100%;
      max-width: 720px;
      animation: fadeUp 0.45s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* HEADER */
    .header {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }

    .header img { height: 36px; width: auto; }


    .title-row {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        position: relative;
        margin-bottom: 6px;
    }

    .back-btn {
        position: absolute;
        left: 10px;
        margin-top: 30px;
        width: 60px;
        height: 60px;
        border-radius: 50%;
        background: #ffffff;
        border: 2px solid #f0f0f0;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        color: #1a1a1a;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
        transition: box-shadow 0.2s, transform 0.2s;
    }

    .back-btn:hover {
        box-shadow: 0 6px 24px rgba(0, 0, 0, 0.1);
        transform: translateY(-2px);
    }

    .page-title {
      font-size: 24px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 0;
    }

    .page-subtitle {
        text-align: center;
        font-size: 15px;
        color: #aaa;
        margin-bottom: 28px;
    }

    .divider { width: 100%; height: 1px; background: #eee; margin-bottom: 8px; }

    /* CATEGORY LIST */
    .category-list {
      width: 100%;
      display: flex;
      flex-direction: column;
    }

    .category-item {
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 14px 12px;
      border-radius: 14px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s, transform 0.15s;
      border-bottom: 1px solid #f2f2f2;
      position: relative;
    }

    .category-item:last-child { border-bottom: none; }

    .category-item:hover {
      background: #f7fdf9;
      transform: translateX(4px);
    }

    .category-item:hover .cat-arrow { color: #00A046; }

    /* ICON */
    .cat-icon {
      width: 40px; height: 40px;
      border-radius: 16px;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
      position: relative;
    }

    .cat-icon svg { width: 38px; height: 38px; }

    /* Icon backgrounds per category */
    .icon-transport  { background: linear-gradient(145deg, #e8eeff, #c8d4ff); }
    .icon-realty     { background: linear-gradient(145deg, #e8f4ff, #c0dcf8); }
    .icon-work       { background: linear-gradient(145deg, #f0eaff, #d8c8f8); }
    .icon-services   { background: linear-gradient(145deg, #e0f2ff, #b8e0f8); }
    .icon-personal   { background: linear-gradient(145deg, #f8ecff, #e8c8f8); }
    .icon-home       { background: linear-gradient(145deg, #fff4e0, #ffd8a0); }
    .icon-electronics{ background: linear-gradient(145deg, #e8f8ff, #b0e0ff); }
    .icon-hobby      { background: linear-gradient(145deg, #fff0f8, #ffc8e8); }
    .icon-animals    { background: linear-gradient(145deg, #f0fff4, #b8f0d0); }
    .icon-business   { background: linear-gradient(145deg, #f4f4f4, #dcdcdc); }

    .cat-text { flex: 1; }

    .cat-title {
      font-size: 17px;
      font-weight: 600;
      color: #1a1a1a;
    }

    .cat-arrow {
      font-size: 20px;
      color: #ddd;
      transition: color 0.18s, transform 0.15s;
    }
    .category-item:hover .cat-arrow { transform: translateX(2px); }
  </style>
</head>
<body>

<div class="card">

  <!-- Header -->
  <div class="header">
    <img src="https://logo-teka.com/wp-content/uploads/2025/06/avito-logo.svg" alt="Авито"/>
  </div>

    <div class="title-row">
        <a class="back-btn" href="index.html">

  <p class="page-subtitle">Выберите категорию</p>

    <!-- Животные -->

    <!-- Готовый бизнес и оборудование -->
