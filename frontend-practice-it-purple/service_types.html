<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Авито — Виды услуг</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: #ffffff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }

        .card {
            background: rgba(255,255,255,0.72);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1.5px solid #00A046;
            border-radius: 24px;
            box-shadow: 0 2px 24px rgba(0,160,70,0.07);
            padding: 52px 88px 56px;
            width: 100%;
            max-width: 720px;

            height: 950px;

            display: flex;
            flex-direction: column;
            animation: fadeUp 0.45s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(18px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .header { display: flex; justify-content: center; margin-bottom: 20px; }
        .header img { height: 36px; }

        .title-row {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            position: relative;
            margin-bottom: 8px;
        }

        .title-row {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            position: relative;
            margin-bottom: 6px;
        }

        .back-btn {
            position: absolute;
            left: 10px;
            margin-top: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #ffffff;
            border: 2px solid #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #1a1a1a;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
            transition: box-shadow 0.2s, transform 0.2s;
        }

        .back-btn:hover {
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.1);
            transform: translateY(-2px);
        }

        .page-title { font-size: 24px; font-weight: 700; color: #1a1a1a; }
        .page-subtitle { text-align: center; font-size: 15px; color: #aaa; margin-bottom: 24px; }
        .divider { width: 100%; height: 1px; background: #eee; margin-bottom: 12px; }

        .service-list {
            display: flex;
            flex-direction: column;

            flex: 1;
            overflow-y: auto;

            padding-right: 5px;
        }

        /* Кастомный скроллбар */
        .service-list::-webkit-scrollbar { width: 4px; }
        .service-list::-webkit-scrollbar-thumb { background: #eee; border-radius: 4px; }

        .service-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 12px;
            border-radius: 14px;
            text-decoration: none;
            transition: all 0.15s;
            border-bottom: 1px solid #f2f2f2;
        }
        .service-item:hover { background: #f7fdf9; transform: translateX(5px); }

        /* Иконки с разными фонами */
        .s-icon {
            width: 42px; height: 42px;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .s-title { font-size: 16px; font-weight: 600; color: #333; flex: 1; }
        .s-arrow { color: #ddd; font-size: 20px; }

    </style>
</head>
<body>

<div class="card">

    </nav>
