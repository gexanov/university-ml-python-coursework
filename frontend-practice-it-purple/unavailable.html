<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Авито — Категория недоступна</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .card {
            background: rgba(255,255,255,0.72);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1.5px solid #00A046;
            border-radius: 24px;
            box-shadow: 0 2px 24px rgba(0,160,70,0.07);
            padding: 52px 88px 56px;
            width: 100%;
            max-width: 720px;
            animation: fadeUp 0.45s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(18px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* HEADER */
        .header { display: flex; justify-content: center; margin-bottom: 20px; }
        .header img { height: 36px; width: auto; }

        .page-title {
            font-size: 30px;
            font-weight: 700;
            color: #1a1a1a;
            text-align: center;
            margin-top: 30px;
            margin-bottom: 24px;
        }

        .divider { width: 100%; height: 1px; background: #eee; margin-bottom: 24px; }

        /* ERROR CONTENT */
        .error-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 32px 0 20px;
        }

        .error-icon {
            font-size: 64px;
            margin-bottom: 20px;
            line-height: 1;
        }

        .error-title {
            font-size: 18px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 12px;
        }

        .error-desc {
            font-size: 15px;
            color: #888;
            line-height: 1.5;
            max-width: 400px;
            margin-bottom: 32px;
        }

        .primary-btn {
            background: #00A046;
            color: #fff;
            text-decoration: none;
            font-size: 15px;
            font-weight: 600;
            padding: 14px 28px;
            border-radius: 12px;
            transition: background 0.2s, transform 0.2s;
        }

        .primary-btn:hover {
            background: #008f3e;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

<div class="card">
    <!-- Header -->
    <div class="header">
        <img src="https://logo-teka.com/wp-content/uploads/2025/06/avito-logo.svg" alt="Авито"/>
    </div>
        <p class="page-title">Упс!</p>
    <div class="divider"></div>

    <!-- Содержимое заглушки -->
    <div class="error-state">
        <div class="error-icon">🚧</div>
        <div class="error-title">Раздел в разработке</div>
        <p class="error-desc">
            Приносим свои извинения за доставленные неудобства. Вы можете воспользоваться разделом <b>«Услуги» -> «Ремонт и отделка»</b>
        </p>
        <a href="create.html" class="primary-btn">Вернуться к категориям</a>
    </div>

</div>

</body>
</html>
